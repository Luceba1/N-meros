<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Números para peques</title>
  <style>
    :root {
      --bg1: #f7f9ff;
      --bg2: #eef5ff;
      --panel: #ffffff;
      --line: #e8eeff;
      --text: #22315f;
      --muted: #66729e;
      --blue: #5b7cff;
      --blue-dark: #4162e8;
      --yellow: #ffd86a;
      --pink: #ff9dc6;
      --green: #19bf78;
      --red: #f25a74;
      --shadow: 0 18px 40px rgba(75, 99, 189, 0.16);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(157, 190, 255, 0.40) 0 12%, transparent 13%),
        radial-gradient(circle at 92% 12%, rgba(255, 216, 106, 0.32) 0 11%, transparent 12%),
        radial-gradient(circle at 88% 90%, rgba(255, 157, 198, 0.22) 0 12%, transparent 13%),
        radial-gradient(circle at 10% 88%, rgba(126, 232, 184, 0.22) 0 11%, transparent 12%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 18px;
      display: grid;
      place-items: center;
    }

    .app {
      width: min(100%, 1080px);
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(250,252,255,0.98) 100%);
      border: 1px solid rgba(231,238,255,0.9);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .logo {
      width: 66px;
      height: 66px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: linear-gradient(180deg, #f2f6ff 0%, #e7eeff 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1;
    }

    .tiny-help {
      color: var(--muted);
      font-size: .95rem;
      margin-top: 6px;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: bold;
      background: linear-gradient(180deg, #f4f7ff 0%, #edf2ff 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .chip.good { background: linear-gradient(180deg, #effff5 0%, #e7fff0 100%); color: #0d955c; }
    .chip.soft { background: linear-gradient(180deg, #fff9e7 0%, #fff2ca 100%); color: #8a6500; }

    .modes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .mode-btn {
      border: none;
      background: linear-gradient(180deg, #f7f9ff 0%, #edf2ff 100%);
      border-radius: 24px;
      padding: 16px 10px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      place-items: center;
      color: var(--text);
      box-shadow: 0 12px 22px rgba(80, 105, 209, 0.12);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .mode-btn:hover { transform: translateY(-1px); }
    .mode-btn:active { transform: translateY(1px) scale(.985); }

    .mode-btn.active {
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff;
      box-shadow: 0 14px 28px rgba(65, 98, 232, 0.24);
    }

    .mode-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .mode-label {
      font-size: 1rem;
      font-weight: 900;
    }

    .main {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      min-width: 0;
    }

    .hero {
      display: grid;
      gap: 16px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-badge {
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      color: #835e00;
      background: linear-gradient(180deg, #fff8e3 0%, #fff1c7 100%);
      border: 1px solid #ffe49b;
    }

    .icon-btn,
    .action-btn,
    .num-btn,
    .pick-card {
      border: none;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .icon-btn:hover,
    .action-btn:hover,
    .num-btn:hover,
    .pick-card:hover { transform: translateY(-1px); }

    .icon-btn:active,
    .action-btn:active,
    .num-btn:active,
    .pick-card:active { transform: translateY(1px) scale(.985); }

    .icon-btn {
      width: 68px;
      height: 68px;
      border-radius: 22px;
      font-size: 1.9rem;
      background: linear-gradient(180deg, #eef4ff 0%, #e4ecff 100%);
      box-shadow: 0 12px 20px rgba(80, 105, 209, 0.15);
    }

    .big-stage {
      display: grid;
      gap: 12px;
      place-items: center;
      background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
      border: 1px solid #e6ecff;
      border-radius: 28px;
      padding: 18px;
      min-height: 250px;
    }

    .big-digit {
      font-size: clamp(5.5rem, 15vw, 9rem);
      line-height: .9;
      font-weight: 900;
      color: var(--blue);
      text-shadow: 0 10px 20px rgba(91,124,255,0.12);
    }

    .big-word {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      text-transform: lowercase;
    }

    .scene {
      width: 100%;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      border: 1px solid #edf2ff;
      border-radius: 26px;
      padding: 18px;
      display: grid;
      gap: 14px;
      min-height: 230px;
    }

    .scene-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 1.02rem;
      font-weight: 900;
    }

    .scene-drawing {
      min-height: 128px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding: 6px;
    }

    .sticker {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: linear-gradient(180deg, #fff7e2 0%, #fff1ca 100%);
      box-shadow: 0 10px 18px rgba(255, 200, 79, 0.14);
    }

    .empty-box {
      width: min(100%, 250px);
      min-height: 104px;
      border-radius: 24px;
      border: 3px dashed #d3dcff;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: bold;
      background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
      padding: 16px;
      text-align: center;
    }

    .mini-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-pill {
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      background: linear-gradient(180deg, #f6f8ff 0%, #edf2ff 100%);
      color: var(--muted);
    }

    .status {
      min-height: 68px;
      border-radius: 22px;
      padding: 14px 16px;
      display: grid;
      align-items: center;
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.35;
      background: linear-gradient(180deg, #eef4ff 0%, #e7efff 100%);
      color: var(--blue);
      box-shadow: inset 0 0 0 1px #dce6ff;
    }

    .status.ok {
      background: linear-gradient(180deg, #effff5 0%, #e7fff0 100%);
      color: var(--green);
      box-shadow: inset 0 0 0 1px #c8f1db;
    }

    .status.bad {
      background: linear-gradient(180deg, #fff5f7 0%, #fff0f3 100%);
      color: var(--red);
      box-shadow: inset 0 0 0 1px #ffd5dd;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 12px 20px rgba(80, 105, 209, 0.14);
    }

    .action-btn.primary {
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff;
    }

    .action-btn.soft {
      background: linear-gradient(180deg, #fff1f8 0%, #ffe8f2 100%);
      color: var(--text);
    }

    .action-btn.light {
      background: linear-gradient(180deg, #f6f8ff 0%, #edf2ff 100%);
      color: var(--text);
    }

    .target-box {
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
      border: 1px solid #e6ecff;
      border-radius: 28px;
      padding: 18px;
      place-items: center;
    }

    .target-top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .target-label {
      font-weight: 900;
      font-size: 1.08rem;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .num-btn,
    .ghost {
      aspect-ratio: 1 / 1;
      border-radius: 24px;
    }

    .ghost { background: transparent; }

    .num-btn {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: var(--text);
      background: linear-gradient(180deg, var(--top, #eef3ff) 0%, var(--bottom, #e6ecff) 100%);
      box-shadow: 0 12px 22px rgba(80, 105, 209, 0.14), inset 0 1px 0 rgba(255,255,255,0.78);
      position: relative;
      overflow: hidden;
    }

    .num-btn.ok {
      background: linear-gradient(180deg, #e9fff2 0%, #d8ffea 100%);
      color: var(--green);
    }

    .num-btn.bad {
      background: linear-gradient(180deg, #fff2f5 0%, #ffdfe6 100%);
      color: var(--red);
    }

    .num-btn.reveal {
      outline: 4px solid var(--yellow);
    }

    .tone-0 { --top: #f4efff; --bottom: #ece4ff; }
    .tone-1 { --top: #eaf6ff; --bottom: #dff0ff; }
    .tone-2 { --top: #eefaff; --bottom: #dffaff; }
    .tone-3 { --top: #eefcf3; --bottom: #def8e7; }
    .tone-4 { --top: #fff9ea; --bottom: #fff1cf; }
    .tone-5 { --top: #fff1e7; --bottom: #ffe6d3; }
    .tone-6 { --top: #fff0f7; --bottom: #ffe1ef; }
    .tone-7 { --top: #f3efff; --bottom: #e8e1ff; }
    .tone-8 { --top: #edf1ff; --bottom: #e1e8ff; }
    .tone-9 { --top: #eefeff; --bottom: #dcfbff; }

    .pick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .pick-card {
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
      box-shadow: 0 12px 22px rgba(80, 105, 209, 0.14);
      display: grid;
      place-items: center;
      padding: 12px;
      gap: 10px;
      font-size: 1.3rem;
    }

    .pick-card.ok {
      background: linear-gradient(180deg, #e9fff2 0%, #d8ffea 100%);
    }

    .pick-card.bad {
      background: linear-gradient(180deg, #fff2f5 0%, #ffdfe6 100%);
    }

    .pick-card.reveal {
      outline: 4px solid var(--yellow);
    }

    .pick-drawing {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 1.6rem;
      line-height: 1;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .bubble {
      min-height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(180deg, #f6f8ff 0%, #edf2ff 100%);
      border: 3px solid transparent;
      color: var(--blue);
    }

    .bubble.current {
      border-color: var(--yellow);
      background: linear-gradient(180deg, #fff9e3 0%, #fff2c8 100%);
    }

    .bubble.done {
      border-color: #bdf0d5;
      background: linear-gradient(180deg, #edfff5 0%, #defbe9 100%);
      color: var(--green);
    }

    .bubble.hide-digit { font-size: 2.1rem; }

    .adult-note {
      background: linear-gradient(180deg, #fafbff 0%, #f5f7ff 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px 16px;
      color: var(--muted);
      line-height: 1.5;
      font-size: .95rem;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .modes { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .app { padding: 14px; border-radius: 24px; }
      .panel { padding: 14px; border-radius: 22px; }
      .actions { display: grid; grid-template-columns: 1fr; }
      .action-btn { width: 100%; }
      .sticker { width: 60px; height: 60px; font-size: 1.8rem; border-radius: 18px; }
      .status { font-size: 1rem; min-height: 60px; }
    }

    @media (max-width: 430px) {
      .modes { grid-template-columns: 1fr 1fr; }
      .logo { width: 56px; height: 56px; font-size: 1.7rem; }
      .chip { width: 100%; text-align: center; }
      .pick-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🔢</div>
        <div>
          <h1>Números</h1>
          <div class="tiny-help">ver → tocar → unir → escuchar</div>
        </div>
      </div>

      <div class="chips">
        <div class="chip good" id="scoreChip">⭐ 0</div>
        <div class="chip" id="modeChip">👀 Ver</div>
        <div class="chip soft" id="focusChip">💡 0 1 2</div>
      </div>
    </div>

    <div class="modes">
      <button class="mode-btn active" data-mode="learn">
        <div class="mode-icon">👀</div>
        <div class="mode-label">Ver</div>
      </button>
      <button class="mode-btn" data-mode="recognize">
        <div class="mode-icon">🎯</div>
        <div class="mode-label">Tocar</div>
      </button>
      <button class="mode-btn" data-mode="match">
        <div class="mode-icon">🧩</div>
        <div class="mode-label">Unir</div>
      </button>
      <button class="mode-btn" data-mode="audio">
        <div class="mode-icon">🔊</div>
        <div class="mode-label">Escuchar</div>
      </button>
    </div>

    <div class="main">
      <section class="panel" id="leftPanel"></section>
      <section class="panel" id="rightPanel"></section>
    </div>

    <div class="adult-note">
      Casi todo habla solo. El error muestra la respuesta correcta. El teclado queda fijo para que el número se reconozca mejor.
    </div>
  </div>

  <script>
    const DATA = [
      { digit: 0, word: 'cero', object: 'pelotas', emoji: '⚽', context: 'No hay pelotas', empty: true },
      { digit: 1, word: 'uno', object: 'sol', emoji: '☀️', context: 'Un sol' },
      { digit: 2, word: 'dos', object: 'ojos', emoji: '👀', context: 'Dos ojos' },
      { digit: 3, word: 'tres', object: 'pelotas', emoji: '⚽', context: 'Tres pelotas' },
      { digit: 4, word: 'cuatro', object: 'autos', emoji: '🚗', context: 'Cuatro autos' },
      { digit: 5, word: 'cinco', object: 'estrellas', emoji: '⭐', context: 'Cinco estrellas' },
      { digit: 6, word: 'seis', object: 'manzanas', emoji: '🍎', context: 'Seis manzanas' },
      { digit: 7, word: 'siete', object: 'flores', emoji: '🌼', context: 'Siete flores' },
      { digit: 8, word: 'ocho', object: 'globos', emoji: '🎈', context: 'Ocho globos' },
      { digit: 9, word: 'nueve', object: 'caramelos', emoji: '🍬', context: 'Nueve caramelos' }
    ];

    const orderedKeyboard = [7, 8, 9, 4, 5, 6, 1, 2, 3, null, 0, null];
    const STORAGE_KEY = 'numeros_visual_auditivo_v1';

    const state = {
      mode: 'learn',
      points: 0,
      currentDigit: 1,
      recognizeTarget: 1,
      matchTarget: 1,
      matchOptions: [],
      audioSequence: [1],
      audioIndex: 0,
      audioRound: 1,
      progress: loadProgress(),
      audioContext: null
    };

    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    const scoreChip = document.getElementById('scoreChip');
    const modeChip = document.getElementById('modeChip');
    const focusChip = document.getElementById('focusChip');
    const modeButtons = [...document.querySelectorAll('.mode-btn')];

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      const base = {};
      for (let i = 0; i <= 9; i++) {
        base[i] = { ok: 0, bad: 0, seen: 0 };
      }
      return base;
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function getInfo(digit) {
      return DATA.find(item => item.digit === digit);
    }

    function repeatEmoji(emoji, count) {
      return Array.from({ length: count }, () => emoji);
    }

    function weakestDigits(limit = 3) {
      return [...DATA]
        .map(item => {
          const p = state.progress[item.digit] || { ok: 0, bad: 0, seen: 0 };
          const total = p.ok + p.bad;
          const score = total === 0 ? -1 : p.ok / total;
          return { digit: item.digit, score, seen: p.seen };
        })
        .sort((a, b) => {
          if (a.score === b.score) return a.seen - b.seen;
          return a.score - b.score;
        })
        .slice(0, limit)
        .map(item => item.digit);
    }

    function weightedRandomDigit() {
      const weak = weakestDigits(4);
      const bag = [];
      DATA.forEach(item => {
        const p = state.progress[item.digit];
        const total = p.ok + p.bad;
        let weight = 1;
        if (weak.includes(item.digit)) weight += 4;
        if (total === 0) weight += 2;
        if (p.bad > p.ok) weight += 2;
        for (let i = 0; i < weight; i++) bag.push(item.digit);
      });
      return bag[Math.floor(Math.random() * bag.length)];
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      if (mode === 'learn') state.currentDigit = weightedRandomDigit();
      if (mode === 'recognize') state.recognizeTarget = weightedRandomDigit();
      if (mode === 'match') buildMatchRound();
      if (mode === 'audio') buildAudioRound();
      render();
    }

    function updateTopChips() {
      scoreChip.textContent = `⭐ ${state.points}`;
      const names = {
        learn: '👀 Ver',
        recognize: '🎯 Tocar',
        match: '🧩 Unir',
        audio: '🔊 Escuchar'
      };
      modeChip.textContent = names[state.mode];
      focusChip.textContent = `💡 ${weakestDigits(3).join(' ')}`;
    }

    function recordSeen(digit) {
      state.progress[digit].seen += 1;
      saveProgress();
      updateTopChips();
    }

    function recordOk(digit) {
      state.points += 1;
      state.progress[digit].ok += 1;
      state.progress[digit].seen += 1;
      saveProgress();
      updateTopChips();
    }

    function recordBad(digit) {
      state.progress[digit].bad += 1;
      state.progress[digit].seen += 1;
      saveProgress();
      updateTopChips();
    }

    function speak(text, rate = 0.88) {
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'es-AR';
      utterance.rate = rate;
      utterance.pitch = 1.02;
      utterance.volume = 1;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function getAudioContext() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      if (!state.audioContext) state.audioContext = new AudioCtx();
      if (state.audioContext.state === 'suspended') state.audioContext.resume().catch(() => {});
      return state.audioContext;
    }

    function playTone({ frequency = 440, duration = 0.12, type = 'sine', volume = 0.03, startDelay = 0 }) {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime + startDelay;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function successSound() {
      playTone({ frequency: 523.25, duration: 0.07, volume: 0.03 });
      playTone({ frequency: 659.25, duration: 0.09, volume: 0.03, startDelay: 0.05 });
      playTone({ frequency: 783.99, duration: 0.09, type: 'triangle', volume: 0.02, startDelay: 0.12 });
    }

    function errorSound() {
      playTone({ frequency: 220, duration: 0.12, type: 'square', volume: 0.022 });
      playTone({ frequency: 170, duration: 0.14, type: 'triangle', volume: 0.02, startDelay: 0.06 });
    }

    function sceneHTML(digit) {
      const info = getInfo(digit);
      if (digit === 0) {
        return `
          <div class="empty-box">0 ${info.object}<br>vacío</div>
        `;
      }
      return repeatEmoji(info.emoji, digit)
        .map(emoji => `<div class="sticker">${emoji}</div>`)
        .join('');
    }

    function smallSceneHTML(digit) {
      const info = getInfo(digit);
      if (digit === 0) return `<div class="pick-drawing"><span>📭</span></div>`;
      return `<div class="pick-drawing">${repeatEmoji(info.emoji, digit).map(emoji => `<span>${emoji}</span>`).join('')}</div>`;
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildMatchRound() {
      const target = weightedRandomDigit();
      state.matchTarget = target;
      const options = new Set([target]);
      while (options.size < 3) {
        options.add(Math.floor(Math.random() * 10));
      }
      state.matchOptions = shuffle([...options]);
      recordSeen(target);
    }

    function getAudioLength() {
      if (state.audioRound <= 2) return 1;
      if (state.audioRound <= 5) return 2;
      return 3;
    }

    function buildAudioRound() {
      const weak = weakestDigits(5);
      const length = getAudioLength();
      const seq = [];
      for (let i = 0; i < length; i++) {
        const useWeak = Math.random() < 0.65;
        seq.push(useWeak ? weak[Math.floor(Math.random() * weak.length)] : Math.floor(Math.random() * 10));
      }
      state.audioSequence = seq;
      state.audioIndex = 0;
      seq.forEach(d => recordSeen(d));
    }

    function renderLearn() {
      const info = getInfo(state.currentDigit);
      leftPanel.innerHTML = `
        <div class="hero">
          <div class="hero-top">
            <div class="hero-badge">👀 mirar y escuchar</div>
            <button class="icon-btn" id="speakLearnBtn" aria-label="Escuchar">🔊</button>
          </div>

          <div class="big-stage">
            <div class="big-digit">${info.digit}</div>
            <div class="big-word">${info.word}</div>
            <div class="mini-row">
              <div class="mini-pill">${info.context}</div>
            </div>
          </div>

          <div class="status" id="learnStatus">🔊 ${info.word}</div>

          <div class="actions">
            <button class="action-btn primary" id="nextLearnBtn">✨ otro</button>
            <button class="action-btn soft" id="goRecognizeBtn">🎯 tocar</button>
          </div>
        </div>
      `;

      rightPanel.innerHTML = `
        <div class="scene">
          <div class="scene-title">
            <span>🖼️ dibujo</span>
            <span>${info.digit} ${info.object}</span>
          </div>
          <div class="scene-drawing">
            ${sceneHTML(info.digit)}
          </div>
        </div>
      `;

      document.getElementById('speakLearnBtn').addEventListener('click', () => {
        speak(`Este es el ${info.word}. ${info.context}.`, 0.84);
      });
      document.getElementById('nextLearnBtn').addEventListener('click', () => {
        state.currentDigit = weightedRandomDigit();
        render();
      });
      document.getElementById('goRecognizeBtn').addEventListener('click', () => setMode('recognize'));

      setTimeout(() => speak(`Este es el ${info.word}. ${info.context}.`, 0.84), 160);
    }

    function keyboardHTML() {
      return orderedKeyboard.map(item => {
        if (item === null) return `<div class="ghost"></div>`;
        return `<button class="num-btn tone-${item}" data-digit="${item}">${item}</button>`;
      }).join('');
    }

    function renderRecognize(status = `🎯 tocá el ${getInfo(state.recognizeTarget).word}`, statusClass = '') {
      const info = getInfo(state.recognizeTarget);
      leftPanel.innerHTML = `
        <div class="hero">
          <div class="target-box">
            <div class="target-top">
              <div class="target-label">🎯 tocar</div>
              <button class="icon-btn" id="repeatRecognizeBtn" aria-label="Repetir">🔊</button>
            </div>
            <div class="big-digit">${info.digit}</div>
            <div class="big-word">${info.word}</div>
            <div class="mini-row"><div class="mini-pill">${info.context}</div></div>
          </div>
          <div class="status ${statusClass}" id="recognizeStatus">${status}</div>
          <div class="actions">
            <button class="action-btn light" id="newRecognizeBtn">🔁 otro</button>
            <button class="action-btn soft" id="goMatchBtn">🧩 unir</button>
          </div>
        </div>
      `;

      rightPanel.innerHTML = `
        <div class="scene">
          <div class="scene-title">
            <span>⌨️ teclado fijo</span>
            <span>${info.word}</span>
          </div>
          <div class="keyboard" id="recognizeKeyboard">${keyboardHTML()}</div>
        </div>
      `;

      document.getElementById('repeatRecognizeBtn').addEventListener('click', () => {
        speak(`Tocá el ${info.word}.`, 0.85);
      });
      document.getElementById('newRecognizeBtn').addEventListener('click', () => {
        state.recognizeTarget = weightedRandomDigit();
        recordSeen(state.recognizeTarget);
        render();
      });
      document.getElementById('goMatchBtn').addEventListener('click', () => setMode('match'));

      document.querySelectorAll('#recognizeKeyboard .num-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const digit = Number(btn.dataset.digit);
          if (digit === state.recognizeTarget) {
            btn.classList.add('ok');
            recordOk(digit);
            successSound();
            document.getElementById('recognizeStatus').className = 'status ok';
            document.getElementById('recognizeStatus').textContent = `✅ ${getInfo(digit).word}`;
            speak(`Muy bien. ${getInfo(digit).word}.`, 0.86);
            setTimeout(() => {
              state.recognizeTarget = weightedRandomDigit();
              recordSeen(state.recognizeTarget);
              render();
            }, 900);
          } else {
            btn.classList.add('bad');
            recordBad(state.recognizeTarget);
            errorSound();
            const correct = document.querySelector(`#recognizeKeyboard .num-btn[data-digit="${state.recognizeTarget}"]`);
            if (correct) correct.classList.add('reveal');
            document.getElementById('recognizeStatus').className = 'status bad';
            document.getElementById('recognizeStatus').textContent = `👉 este es el ${getInfo(state.recognizeTarget).word}`;
            speak(`Este es el ${getInfo(state.recognizeTarget).word}.`, 0.82);
            setTimeout(() => renderRecognize(`🎯 tocá el ${getInfo(state.recognizeTarget).word}`), 1150);
          }
        });
      });

      setTimeout(() => speak(`Tocá el ${info.word}.`, 0.85), 130);
    }

    function renderMatch(status = `🧩 ¿dónde hay ${getInfo(state.matchTarget).word}?`, statusClass = '') {
      const info = getInfo(state.matchTarget);
      leftPanel.innerHTML = `
        <div class="hero">
          <div class="target-box">
            <div class="target-top">
              <div class="target-label">🧩 unir</div>
              <button class="icon-btn" id="repeatMatchBtn" aria-label="Repetir">🔊</button>
            </div>
            <div class="big-digit">${info.digit}</div>
            <div class="big-word">${info.word}</div>
            <div class="mini-row"><div class="mini-pill">${info.context}</div></div>
          </div>
          <div class="status ${statusClass}" id="matchStatus">${status}</div>
          <div class="actions">
            <button class="action-btn light" id="newMatchBtn">🔁 otro</button>
            <button class="action-btn soft" id="goAudioBtn">🔊 escuchar</button>
          </div>
        </div>
      `;

      rightPanel.innerHTML = `
        <div class="scene">
          <div class="scene-title">
            <span>🖼️ elegí el dibujo</span>
            <span>${info.word}</span>
          </div>
          <div class="pick-grid" id="pickGrid">
            ${state.matchOptions.map(option => `
              <button class="pick-card" data-option="${option}">
                ${smallSceneHTML(option)}
              </button>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('repeatMatchBtn').addEventListener('click', () => {
        speak(`Buscá ${info.word}.`, 0.85);
      });
      document.getElementById('newMatchBtn').addEventListener('click', () => {
        buildMatchRound();
        render();
      });
      document.getElementById('goAudioBtn').addEventListener('click', () => setMode('audio'));

      document.querySelectorAll('#pickGrid .pick-card').forEach(card => {
        card.addEventListener('click', () => {
          const selected = Number(card.dataset.option);
          if (selected === state.matchTarget) {
            card.classList.add('ok');
            recordOk(selected);
            successSound();
            document.getElementById('matchStatus').className = 'status ok';
            document.getElementById('matchStatus').textContent = `✅ ${info.word}`;
            speak(`Muy bien. ${info.word}.`, 0.86);
            setTimeout(() => {
              buildMatchRound();
              render();
            }, 900);
          } else {
            card.classList.add('bad');
            recordBad(state.matchTarget);
            errorSound();
            const correct = document.querySelector(`#pickGrid .pick-card[data-option="${state.matchTarget}"]`);
            if (correct) correct.classList.add('reveal');
            document.getElementById('matchStatus').className = 'status bad';
            document.getElementById('matchStatus').textContent = `👉 acá está ${info.word}`;
            speak(`Acá está ${info.word}.`, 0.82);
            setTimeout(() => renderMatch(`🧩 ¿dónde hay ${info.word}?`), 1150);
          }
        });
      });

      setTimeout(() => speak(`Buscá ${info.word}.`, 0.85), 140);
    }

    function renderAudio(status = '🔊 escuchá y tocá', statusClass = '') {
      leftPanel.innerHTML = `
        <div class="hero">
          <div class="hero-top">
            <div class="hero-badge">🔊 escuchar</div>
            <button class="icon-btn" id="repeatAudioBtn" aria-label="Escuchar">🔊</button>
          </div>

          <div class="scene">
            <div class="scene-title">
              <span>⭐ ronda ${state.audioRound}</span>
              <span>${state.audioSequence.length} número${state.audioSequence.length > 1 ? 's' : ''}</span>
            </div>
            <div class="progress" id="audioProgress">
              ${state.audioSequence.map((digit, index) => {
                let cls = 'bubble hide-digit';
                let content = '●';
                if (index < state.audioIndex) {
                  cls = 'bubble done';
                  content = digit;
                } else if (index === state.audioIndex) {
                  cls = 'bubble current hide-digit';
                }
                return `<div class="${cls}">${content}</div>`;
              }).join('')}
            </div>
          </div>

          <div class="status ${statusClass}" id="audioStatus">${status}</div>

          <div class="actions">
            <button class="action-btn primary" id="listenSequenceBtn">🔊 escuchar</button>
            <button class="action-btn light" id="resetAudioBtn">🔁 nueva</button>
          </div>
        </div>
      `;

      rightPanel.innerHTML = `
        <div class="scene">
          <div class="scene-title">
            <span>⌨️ tocar en orden</span>
            <span>despacio</span>
          </div>
          <div class="keyboard" id="audioKeyboard">${keyboardHTML()}</div>
        </div>
      `;

      document.getElementById('repeatAudioBtn').addEventListener('click', speakAudioSequence);
      document.getElementById('listenSequenceBtn').addEventListener('click', speakAudioSequence);
      document.getElementById('resetAudioBtn').addEventListener('click', () => {
        buildAudioRound();
        render();
      });

      document.querySelectorAll('#audioKeyboard .num-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const digit = Number(btn.dataset.digit);
          const expected = state.audioSequence[state.audioIndex];
          if (digit === expected) {
            btn.classList.add('ok');
            recordOk(digit);
            successSound();
            state.audioIndex += 1;
            if (state.audioIndex >= state.audioSequence.length) {
              document.getElementById('audioStatus').className = 'status ok';
              document.getElementById('audioStatus').textContent = '✅ muy bien';
              speak('Muy bien.', 0.86);
              state.audioRound += 1;
              setTimeout(() => {
                buildAudioRound();
                render();
              }, 950);
            } else {
              renderAudio('✅ seguí', 'ok');
            }
          } else {
            btn.classList.add('bad');
            recordBad(expected);
            errorSound();
            document.getElementById('audioStatus').className = 'status bad';
            document.getElementById('audioStatus').textContent = '👉 escuchá otra vez';
            speak(`Escuchá otra vez.`, 0.84);
            setTimeout(speakAudioSequence, 500);
            setTimeout(() => renderAudio('🔊 escuchá y tocá'), 1100);
          }
        });
      });

      setTimeout(speakAudioSequence, 180);
    }

    function speakAudioSequence() {
      const remaining = state.audioSequence.slice(state.audioIndex);
      if (!remaining.length) return;
      speak(remaining.join(' ... '), 0.74);
    }

    function render() {
      updateTopChips();
      if (state.mode === 'learn') return renderLearn();
      if (state.mode === 'recognize') return renderRecognize();
      if (state.mode === 'match') return renderMatch();
      if (state.mode === 'audio') return renderAudio();
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    recordSeen(state.currentDigit);
    render();
  </script>
</body>
</html>
